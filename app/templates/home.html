<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Student Directory</title>
    <style>
        /* Modern Reset & Font Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Dashboard Container */
        .dashboard-container {
            background: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 700px;
        }

        /* Header Layout Split */
        .header-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        h1 {
            color: #333333;
            font-size: 26px;
            font-weight: 600;
        }

        .subtitle {
            color: #888888;
            font-size: 14px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Create Button Style */
        .btn-create {
            background-color: #2ecc71;
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        .btn-create:hover {
            background-color: #27ae60;
        }

        /* Modern Table Styling */
        .student-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .student-table th {
            text-align: left;
            padding: 12px;
            background-color: #f8f9fa;
            color: #666666;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 2px solid #eeeeee;
        }

        .student-table td {
            padding: 14px 12px;
            border-bottom: 1px solid #eeeeee;
            font-size: 15px;
            color: #333333;
        }

        /* Table Row Hover & Link Setup */
        .student-row {
            transition: background-color 0.2s ease;
        }

        .student-row:hover {
            background-color: #f4f8ff;
        }

        .student-link {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 600;
            display: block;
        }

        .student-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- Top Header Action Layout -->
        <div class="header-group">
            <h1>Student Directory</h1>
            <a href="{% url 'create_form' %}" class="btn-create">+ Create Student</a>
        </div>
        <p class="subtitle">Active Database Records</p>

        <!-- Modern Data Table Layout -->
        <table class="student-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>City</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for s in data %}
                <tr class="student-row">
                    <td>#{{ s.id }}</td>
                    <td><strong>{{ s.name }}</strong></td>
                    <td>{{ s.city }}</td>
                    <td>
                        <!-- Kept your clean URL mapping right inside the table row -->
                        <a href="{% url 'studentdetails' s.id %}" class="student-link">View Details →</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
