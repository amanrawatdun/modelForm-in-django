<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details</title>
    <style>
        /* Modern Reset & Font Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Profile Card Container */
        .details-container {
            background: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            color: #333333;
            font-size: 24px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 600;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 12px;
        }

        /* Individual Data Rows */
        .info-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f9f9f9;
        }

        .info-group strong {
            color: #666666;
            font-weight: 500;
            font-size: 15px;
        }

        .info-group span {
            color: #222222;
            font-weight: 600;
            font-size: 16px;
        }

        /* Button Layout Group */
        .actions-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        /* Base Button Styles */
        .btn {
            flex: 1;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        /* Edit Button (Blue) */
        .btn-edit {
            background-color: #4a90e2;
            color: white;
        }

        .btn-edit:hover {
            background-color: #357abd;
        }

        /* Delete Button (Red) */
        .btn-delete {
            background-color: #e74c3c;
            color: white;
        }

        .btn-delete:hover {
            background-color: #c0392b;
        }

        /* Back Link */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #888888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #4a90e2;
        }
    </style>
</head>
<body>

    <div class="details-container">
        <h1>Student Details</h1>
        
        <!-- Info Rows (Fixed the "Name:" labels to show Age & City) -->
        <div class="info-group">
            <strong>Name:</strong>
            <span>{{ student.name }}</span>
        </div>
        
        <div class="info-group">
            <strong>Age:</strong>
            <span>{{ student.age }}</span>
        </div>
        
        <div class="info-group">
            <strong>City:</strong>
            <span>{{ student.city }}</span>
        </div>

        <!-- Action Buttons -->
        <div class="actions-group">
            <a href="{% url 'studentedit' student.id %}" class="btn btn-edit">Edit</a>
            <a href="{% url 'studentDelete' student.id %}" class="btn btn-delete">Delete</a>
        </div>

        <!-- Return Link -->
        <a href="{% url 'home' %}" class="back-link">← Back to Home Page</a>
    </div>

</body>
</html>
