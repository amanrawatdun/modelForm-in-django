<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Demo</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --text-color: #1f2937;
            --light-bg: #f9fafb;
            --border-color: #e5e7eb;
            --success-bg: #ecfdf5;
            --success-text: #065f46;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            background-color: #ffffff;
            line-height: 1.5;
        }

        /* Navigation Bar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background-color: #ffffff;
        }

        .brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--primary-color);
            text-decoration: none;
        }

        .nav-auth {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-welcome {
            font-size: 0.95rem;
            color: #4b5563;
        }

        .user-welcome strong {
            color: var(--text-color);
        }

        /* Buttons & Links */
        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-link {
            color: var(--text-color);
        }

        .btn-link:hover {
            color: var(--primary-color);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-outline {
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        .btn-outline:hover {
            background-color: var(--light-bg);
        }

        /* Flash Messages */
        .messages-container {
            max-width: 1200px;
            margin: 1rem auto 0;
            padding: 0 2rem;
            list-style: none;
        }

        .message {
            padding: 1rem;
            border-radius: 0.375rem;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            background-color: var(--light-bg);
            border: 1px solid var(--border-color);
            /* Fallback style. Django message tags (like .success, .error) can override this */
        }

        .message.success {
            background-color: var(--success-bg);
            color: var(--success-text);
            border-color: #a7f3d0;
        }

        /* Main Content Container */
        .main-content {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
    </style>
</head>
<body>

    <!-- Styled Navigation Bar -->
    <nav class="navbar">
        <a href="/" class="brand">AuthDemo</a>
        
        <div class="nav-auth">
            {% if user.is_authenticated %}
                <span class="user-welcome">Logged in as <strong>{{ user.username }}</strong></span>
                <a href="{% url 'logout' %}" class="btn btn-outline">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-link">Login</a>
                <a href="{% url 'register' %}" class="btn btn-primary">Register</a>
            {% endif %}
        </div>
    </nav>

    <!-- Styled Messages -->
    {% if messages %}
        <ul class="messages-container">
            {% for message in messages %}
                <!-- Added dynamic class injection for Django message tags -->
                <li class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                    {{ message }}
                </li>
            {% endfor %}
        </ul>
    {% endif %}

    <!-- Main Content Wrapper -->
    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
